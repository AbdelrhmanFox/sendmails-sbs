<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SBS Dashboard</title>
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <script>
    (function () {
      var path = location.pathname;
      if (path !== '/' && path !== '/index.html') return;
      var h = location.hash || '';
      if (/public-classroom|public-credential|public-learner/i.test(h)) {
        location.replace('/classic/index.html' + h + location.search);
        return;
      }
      if (!h || h === '#') {
        location.replace('/spa/' + location.search);
        return;
      }
      location.replace('/classic/index.html' + h + location.search);
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0;url=/spa/" />
  </noscript>
</head>
<body>
  <p style="font-family: system-ui, sans-serif; padding: 2rem">
    <a href="/spa/">Open staff dashboard</a> or
    <a href="/classic/">open classic workspace</a>.
  </p>
</body>
</html>
