# Netlify - SBS Dashboard
# Publish from the dashboard folder so index.html is at the site root.
[build]
  command = "cd dashboard-ui && npm install && npm run build"
  publish = "dashboard"

[build.environment]
  NODE_VERSION = "18"
  # Backup for Supabase outbound fetch (same issue as dns.setDefaultResultOrder in netlify/lib/_shared.js)
  NODE_OPTIONS = "--dns-result-order=ipv4first"

# Shared code lives in netlify/lib (not deployable as a function).
[functions]
  node_bundler = "esbuild"

# Optional: prevent caching of index.html so updates show immediately
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

# React SPA (Vite) under /spa/
[[redirects]]
  from = "/spa/*"
  to = "/spa/index.html"
  status = 200
